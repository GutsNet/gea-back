services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gea-back-web
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      PYTHONUNBUFFERED: "1"
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
